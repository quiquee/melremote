<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat - VS Code</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe WPC', 'Segoe UI', 'Ubuntu', 'Droid Sans', sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Title Bar */
        .title-bar {
            height: 30px;
            background: #3c3c3c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 13px;
            user-select: none;
        }

        .title-menus {
            display: flex;
            gap: 15px;
        }

        .title-menus span {
            cursor: default;
        }

        .title-menus span:hover {
            background: #505050;
            border-radius: 3px;
        }

        .title-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #cccccc;
        }

        .title-controls {
            display: flex;
            gap: 10px;
        }

        .title-controls .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .control.close { background: #ff5f56; }
        .control.minimize { background: #ffbd2e; }
        .control.maximize { background: #27c93f; }

        /* Main Area */
        .main-area {
            display: flex;
            flex: 1;
            height: calc(100vh - 52px); /* 30px title + 22px status */
        }

        /* Activity Bar */
        .activity-bar {
            width: 48px;
            background: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap: 20px;
        }

        .activity-icon {
            font-size: 24px;
            color: #858585;
            cursor: pointer;
        }

        .activity-icon.active {
            color: #ffffff;
            border-left: 2px solid #ffffff;
            margin-left: -2px;
            padding-left: 2px;
        }

        /* Side Bar */
        .side-bar {
            width: 250px;
            background: #252526;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e1e1e;
        }

        .side-bar-header {
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #bbbbbb;
        }

        .explorer-content {
            padding: 0 10px;
        }

        .folder {
            font-size: 13px;
        }

        .folder-header {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            padding: 4px 0;
            cursor: pointer;
        }

        .file-list {
            padding-left: 15px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 5px;
            cursor: pointer;
            color: #cccccc;
        }

        .file-item:hover {
            background: #2a2d2e;
        }

        .file-item.active {
            background: #37373d;
            color: #ffffff;
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        .editor-tabs {
            height: 35px;
            background: #252526;
            display: flex;
        }

        .tab {
            height: 100%;
            padding: 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2d2d2d;
            color: #969696;
            font-size: 13px;
            cursor: pointer;
            border-right: 1px solid #1e1e1e;
        }

        .tab.active {
            background: #1e1e1e;
            color: #ffffff;
            border-top: 1px solid #007acc;
        }

        /* Chat Content */
        .editor-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .chat-config {
            padding-bottom: 20px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .vscode-input {
            background: #3c3c3c;
            border: 1px solid transparent;
            color: #cccccc;
            padding: 5px 10px;
            font-family: inherit;
            border-radius: 2px;
            outline: none;
            width: 200px;
        }

        .vscode-input:focus {
            border-color: #007acc;
        }

        .vscode-button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 2px;
        }

        .vscode-button:hover {
            background: #1177bb;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #424242;
        }

        .message {
            display: flex;
            gap: 15px;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            background: #007acc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: #8e24aa;
        }

        .message-content {
            flex: 1;
            line-height: 1.5;
            font-size: 14px;
        }

        .message-content pre {
            background: #2d2d2d;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .chat-input-area {
            margin-top: 10px;
            background: #3c3c3c;
            border: 1px solid #454545;
            border-radius: 2px;
            display: flex;
            padding: 5px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #cccccc;
            padding: 5px;
            resize: none;
            outline: none;
            font-family: inherit;
            max-height: 150px;
        }

        /* Status Bar */
        .status-bar {
            height: 22px;
            background: #007acc;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 12px;
        }

        .status-left, .status-right {
            display: flex;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .status-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <div class="title-menus">
            <span>File</span>
            <span>Edit</span>
            <span>Selection</span>
            <span>View</span>
            <span>Go</span>
            <span>Run</span>
            <span>Terminal</span>
            <span>Help</span>
        </div>
        <div class="title-text">Gemini Chat - Visual Studio Code</div>
        <div class="title-controls">
            <span class="control minimize"></span>
            <span class="control maximize"></span>
            <span class="control close"></span>
        </div>
    </div>

    <div class="main-area">
        <div class="activity-bar">
            <i class="fa-regular fa-file-code activity-icon active"></i>
            <i class="fa-solid fa-magnifying-glass activity-icon"></i>
            <i class="fa-solid fa-code-branch activity-icon"></i>
            <i class="fa-solid fa-play activity-icon"></i>
            <i class="fa-solid fa-boxes-stacked activity-icon"></i>
        </div>

        <div class="side-bar">
            <div class="side-bar-header">EXPLORER</div>
            <div class="explorer-content">
                <div class="folder">
                    <div class="folder-header">
                        <i class="fa-solid fa-chevron-down"></i>
                        <span>MELREMOTE</span>
                    </div>
                    <div class="file-list">
                        <div class="file-item active">
                            <i class="fa-regular fa-message" style="color: #66b2ff;"></i>
                            <span>Gemini Chat</span>
                        </div>
                        <div class="file-item">
                            <i class="fa-brands fa-html5" style="color: #e34c26;"></i>
                            <span>index.html</span>
                        </div>
                        <div class="file-item">
                            <i class="fa-brands fa-python" style="color: #3776ab;"></i>
                            <span>melremote.py</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="editor-area">
            <div class="editor-tabs">
                <div class="tab active">
                    <i class="fa-regular fa-message" style="color: #66b2ff;"></i>
                    Gemini Chat
                    <i class="fa-solid fa-xmark" style="margin-left: 5px; font-size: 10px;"></i>
                </div>
            </div>
            
            <div class="editor-content">
                <div class="chat-config">
                    <input type="password" class="vscode-input" id="apiKeyInput" placeholder="Enter Gemini API Key">
                    <button class="vscode-button" id="saveKeyBtn">Save</button>
                    <select class="vscode-input" id="modelSelector">
                        <option value="">Select Model</option>
                    </select>
                    <span id="apiStatus" style="font-size: 12px; color: #858585;">No API key</span>
                </div>

                <div class="chat-messages" id="chatContainer">
                    <div class="message assistant">
                        <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
                        <div class="message-content">
                            Hello! I am Gemini, your AI assistant. Enter your API key above to start chatting!
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <textarea class="chat-input" id="messageInput" rows="1" placeholder="Ask Gemini something... (Press Enter to send)" disabled></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-item"><i class="fa-solid fa-code-branch"></i> main*</div>
            <div class="status-item"><i class="fa-solid fa-arrows-rotate"></i> 0</div>
            <div class="status-item"><i class="fa-solid fa-circle-xmark"></i> 0 <i class="fa-solid fa-triangle-exclamation"></i> 0</div>
        </div>
        <div class="status-right">
            <div class="status-item">UTF-8</div>
            <div class="status-item">CRLF</div>
            <div class="status-item">HTML</div>
            <div class="status-item"><i class="fa-brands fa-python"></i> 3.12.1</div>
            <div class="status-item"><i class="fa-regular fa-bell"></i></div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let selectedModel = localStorage.getItem('gemini_model') || '';

        const elements = {
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveKeyBtn: document.getElementById('saveKeyBtn'),
            apiStatus: document.getElementById('apiStatus'),
            chatContainer: document.getElementById('chatContainer'),
            messageInput: document.getElementById('messageInput'),
            modelSelector: document.getElementById('modelSelector')
        };

        function init() {
            if (apiKey) {
                elements.apiKeyInput.value = apiKey;
                updateApiStatus(true);
                enableChat();
                fetchModels();
            }

            elements.saveKeyBtn.addEventListener('click', saveApiKey);
            elements.messageInput.addEventListener('keydown', handleKeyDown);
            elements.messageInput.addEventListener('input', autoResize);
            elements.modelSelector.addEventListener('change', handleModelChange);
        }

        function handleModelChange(e) {
            selectedModel = e.target.value;
            localStorage.setItem('gemini_model', selectedModel);
        }

        async function fetchModels() {
            if (!apiKey) return;
            elements.modelSelector.innerHTML = '<option value="">Loading...</option>';
            try {
                const response = await fetch(`/api/models?key=${encodeURIComponent(apiKey)}`);
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Failed to fetch models');

                elements.modelSelector.innerHTML = '';
                data.models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.displayName;
                    elements.modelSelector.appendChild(option);
                });

                if (selectedModel && data.models.some(m => m.id === selectedModel)) {
                    elements.modelSelector.value = selectedModel;
                } else {
                    selectedModel = data.models[0].id;
                    localStorage.setItem('gemini_model', selectedModel);
                }
            } catch (error) {
                elements.modelSelector.innerHTML = '<option value="">Error loading</option>';
            }
        }

        function saveApiKey() {
            const key = elements.apiKeyInput.value.trim();
            if (key) {
                apiKey = key;
                localStorage.setItem('gemini_api_key', key);
                updateApiStatus(true);
                enableChat();
                fetchModels();
            }
        }

        function updateApiStatus(active) {
            elements.apiStatus.textContent = active ? 'Ready' : 'No API key';
            elements.apiStatus.style.color = active ? '#89d185' : '#858585';
        }

        function enableChat() {
            elements.messageInput.disabled = false;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize() {
            elements.messageInput.style.height = 'auto';
            elements.messageInput.style.height = Math.min(elements.messageInput.scrollHeight, 150) + 'px';
        }

        async function sendMessage() {
            const message = elements.messageInput.value.trim();
            if (!message || !apiKey || !selectedModel) return;

            addMessage(message, 'user');
            elements.messageInput.value = '';
            elements.messageInput.style.height = 'auto';
            elements.messageInput.disabled = true;

            const loadingId = 'loading-' + Date.now();
            addLoading(loadingId);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: selectedModel,
                        key: apiKey,
                        contents: [{ parts: [{ text: message }] }]
                    })
                });
                const data = await response.json();
                document.getElementById(loadingId).remove();
                if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                    addMessage(data.candidates[0].content.parts[0].text, 'assistant');
                } else {
                    addMessage('Error: ' + JSON.stringify(data), 'assistant');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage('Error: ' + error.message, 'assistant');
            }

            elements.messageInput.disabled = false;
            elements.messageInput.focus();
        }

        function formatMarkdown(text) {
            let formatted = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            formatted = formatted.replace(/`([^`]+)`/g, '<code style="background:#2d2d2d;padding:2px 4px;border-radius:3px;">$1</code>');
            formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar"><i class="fa-solid ${role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div>
                <div class="message-content">${role === 'user' ? content : formatMarkdown(content)}</div>
            `;
            elements.chatContainer.appendChild(div);
            elements.chatContainer.scrollTop = elements.chatContainer.scrollHeight;
        }

        function addLoading(id) {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = id;
            div.innerHTML = `
                <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-content" style="color:#858585;"><i class="fa-solid fa-circle-notch fa-spin"></i> Thinking...</div>
            `;
            elements.chatContainer.appendChild(div);
            elements.chatContainer.scrollTop = elements.chatContainer.scrollHeight;
        }

        init();
    </script>
</body>
</html>
